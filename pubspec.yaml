name: tennis_sprout
description: TennisSprout - 网球发芽了 / Tennis progress tracker & learning app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Routing
  go_router: ^13.0.0

  # Animations
  lottie: ^2.7.0
  flare_flutter: ^3.0.2

  # Audio
  just_audio: ^0.9.36
  audioplayers: ^5.2.1

  # Video
  video_player: ^2.8.1
  chewie: ^1.7.4

  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI helpers
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.66.0          # Radar chart & gauges
  confetti: ^0.7.0            # Celebration effects

  # File picking — cross-platform (Android/iOS/Mac/Windows/Web)
  file_picker: ^8.0.0

  # QR code rendering (web/desktop Douyin scan login)
  qr_flutter: ^4.1.0

  # Intl
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/i18n/
    - assets/icons/
